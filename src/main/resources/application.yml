server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: producto-service
          uri: ${PRODUCTO_SERVICE_URI:http://localhost:8180}
          predicates:
            - Path=/api/v1/productos,/api/v1/productos/**,/api/productos,/api/productos/**,/api/v2/productos,/api/v2/productos/**,/api/v1/categorias,/api/v1/categorias/**,/api/categorias,/api/categorias/**,/api/v2/categorias,/api/v2/categorias/**,/api/v1/marcas,/api/v1/marcas/**,/api/marcas,/api/marcas/**,/api/v2/marcas,/api/v2/marcas/**

        - id: proveedor-service
          uri: ${PROVEEDOR_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/proveedores,/api/v1/proveedores/**,/api/v2/proveedores,/api/v2/proveedores/**

        - id: cliente-service
          uri: ${CLIENTE_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/clientes,/api/clientes/**,/api/v1/clientes,/api/v1/clientes/**,/api/v2/clientes,/api/v2/clientes/**,/auth,/auth/**

        - id: usuario-service
          uri: ${USUARIO_SERVICE_URI:http://localhost:8183}
          predicates:
            - Path=/api/usuarios,/api/usuarios/**,/api/v1/usuarios,/api/v1/usuarios/**,/api/v2/usuarios,/api/v2/usuarios/**

        - id: inventario-service
          uri: ${INVENTARIO_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/inventario,/api/inventario/**,/api/v1/inventario,/api/v1/inventario/**,/api/v2/inventario,/api/v2/inventario/**
        
        - id: notificaciones-service
          uri: ${NOTIFICACIONES_SERVICE_URI:http://localhost:8089}
          predicates:
            - Path=/api/notificaciones,/api/notificaciones/**,/api/v1/notificaciones,/api/v1/notificaciones/**,/api/v2/notificaciones,/api/v2/notificaciones/**

        - id: compra-service
          uri: ${COMPRA_SERVICE_URI:http://localhost:8088}
          predicates:
            - Path=/api/v1/compras,/api/v1/compras/**,/api/v2/compras,/api/v2/compras/**

        - id: venta-service
          uri: ${VENTA_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/ventas,/api/v1/ventas/**,/api/v2/ventas,/api/v2/ventas/**

        - id: pago-service
          uri: ${PAGO_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/pagos,/api/v1/pagos/**,/api/v2/pagos,/api/v2/pagos/**

        - id: reporte-service
          uri: ${REPORTE_SERVICE_URI:http://localhost:8190}
          predicates:
            - Path=/api/reportes-stock,/api/reportes-stock/**,/api/v1/reportes-stock,/api/v1/reportes-stock/**,/api/v2/reportes-stock,/api/v2/reportes-stock/**

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always